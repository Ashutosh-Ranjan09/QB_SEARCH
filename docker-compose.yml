  #   # IMPORTANT: Ensure this matches the exact name of your backend folder
  #   build: ./middleware  
  #   container_name: qb_api
  #   ports:
  #     - "3001:3001"
  #   environment:
  #     - REDIS_URL=redis://redis:6379
  #     - SOLR_NODES=http://solr1:8983/solr/qb_collection,http://solr2:8983/solr/qb_collection
