version: '3.8'

services:
  # ==========================================
  # ZOOKEEPER ENSEMBLE (The Brain)
  # ==========================================
  zk1:
    image: zookeeper:3.8
    container_name: qb_zk1
    ports:
      - "2181:2181"
    environment:
      ZOO_MY_ID: 1
      ZOO_SERVERS: server.1=zk1:2888:3888;2181 server.2=zk2:2888:3888;2181 server.3=zk3:2888:3888;2181

  zk2:
    image: zookeeper:3.8
    container_name: qb_zk2
    environment:
      ZOO_MY_ID: 2
      ZOO_SERVERS: server.1=zk1:2888:3888;2181 server.2=zk2:2888:3888;2181 server.3=zk3:2888:3888;2181

  zk3:
    image: zookeeper:3.8
    container_name: qb_zk3
    environment:
      ZOO_MY_ID: 3
      ZOO_SERVERS: server.1=zk1:2888:3888;2181 server.2=zk2:2888:3888;2181 server.3=zk3:2888:3888;2181

  # ==========================================
  # SOLR CLUSTER (The Muscle)
  # ==========================================
  solr1:
    image: solr:10.0.0
    container_name: qb_solr1
    ports:
      - "8983:8983"
    environment:
      - ZK_HOST=zk1:2181,zk2:2181,zk3:2181
    depends_on:
      - zk1
      - zk2
      - zk3

  solr2:
    image: solr:10.0.0
    container_name: qb_solr2
    ports:
      - "8984:8983" 
    environment:
      - ZK_HOST=zk1:2181,zk2:2181,zk3:2181
    depends_on:
      - zk1
      - zk2
      - zk3

  # # ==========================================
  # # REDIS CACHE (The Memory)
  # # ==========================================
